name: Daily AI News

on:
  schedule:
    # 12:00 UTC = 08:00 Chile en horario de invierno (abril-octubre, UTC-4)
    # En horario de verano (noviembre-marzo, UTC-3) se dispara a las 09:00 Chile.
    # Ajustar manualmente si quieres mantener 8am exactos durante todo el año.
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ai_news/requirements.txt

      - name: Install deps
        run: pip install -r ai_news/requirements.txt

      - name: Run daily pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          AI_NEWS_RECIPIENT: ${{ secrets.AI_NEWS_RECIPIENT }}
        run: python ai_news/daily_news.py

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/public/data/ai-news/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(ai-news): daily report $(date -u +%Y-%m-%d)"
            git push
          fi
